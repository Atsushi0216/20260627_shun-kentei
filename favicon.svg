<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- 桃のグラデーション -->
    <radialGradient id="peachGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffccd5" />
      <stop offset="45%" stop-color="#ff758f" />
      <stop offset="100%" stop-color="#c9184a" />
    </radialGradient>
    <!-- 葉っぱのグラデーション -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a3b18a" />
      <stop offset="100%" stop-color="#3a5a40" />
    </linearGradient>
    <!-- 桃のハイライト用のフィルターまたは追加効果 -->
  </defs>

  <!-- 葉っぱ -->
  <path d="M 32,18 C 22,10 14,15 14,15 C 14,15 21,22 32,18 Z" fill="url(#leafGrad)" />
  <path d="M 32,18 C 42,10 50,15 50,15 C 50,15 43,22 32,18 Z" fill="url(#leafGrad)" />
  
  <!-- 茎 -->
  <path d="M 32,22 L 32,14" stroke="#582f0e" stroke-width="3.5" stroke-linecap="round" />

  <!-- 桃の本体（ぽってりとしたかわいらしい形状） -->
  <path d="M 32,22 
           C 16,21 8,36 12,49 
           C 16,61 32,61 32,61 
           C 32,61 48,61 52,49 
           C 56,36 48,21 32,22 Z" fill="url(#peachGrad)" />
  
  <!-- 桃の縦の筋（立体感を出すための影） -->
  <path d="M 32,22 C 29,32 29,48 32,61" fill="none" stroke="#a4133c" stroke-width="2" opacity="0.5" stroke-linecap="round" />
</svg>
